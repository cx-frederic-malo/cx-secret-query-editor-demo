regex: (?i)[\w.-]{0,50}?(?:administrator_login_password|password)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,20}("[a-z0-9=_\-]{8,20}")(?:[\x60'"\s;]|\\[nr]|$)
keywords:
    - administrator_login_password
    - password
entropy: 2
path: (?i)\.(?:tf|hcl)$ # regex to limit the rule to specific file paths, for example, only .tf and .hcl files. 
# For regexes, if enclosed in "", make sure to escape backslashes (\\, \\b, etc.)



